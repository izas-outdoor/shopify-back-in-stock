<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Izas Outdoor - Inteligencia de Stock</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@shopify/app-bridge@3"></script>
    <script src="https://unpkg.com/@shopify/app-bridge-utils@3"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] }
          }
        }
      }
    </script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const host = urlParams.get('host');

        if (host) {
            const app = window['app-bridge'].createApp({
                // ⚠️ PON AQUÍ TU API KEY DE LA APP DE SHOPIFY ⚠️
                apiKey: 'ed82254e574f3711a131195ac05ac739', 
                host: host,
                forceRedirect: true
            });
            const TitleBar = window['app-bridge'].actions.TitleBar;
            TitleBar.create(app, { title: 'Inteligencia de Stock' });
        }
    </script>

    <style>
        /* Detalles finos de UI */
        .glass-card {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border-radius: 12px;
        }
        .table-row-hover:hover { background-color: #f4f4f5; transition: background-color 0.2s ease; }
    </style>
</head>

<body class="bg-[#f4f4f5] text-zinc-800 font-sans min-h-screen">

    <header class="bg-zinc-900 px-8 py-5 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-4">
            <img src="https://cdn.shopify.com/s/files/1/0834/1579/3985/files/logo-izas-blanco.svg?v=1699971182" alt="Izas Logo" class="h-8 object-contain">
            <div class="h-6 w-px bg-zinc-700"></div>
            <span class="text-zinc-100 font-semibold tracking-wide text-sm uppercase">Back In Stock Izas</span>
        </div>
        <div class="text-zinc-400 text-sm">
            Actualizado en tiempo real <span class="relative inline-flex h-3 w-3 ml-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 border-t-4 border-t-zinc-900 relative overflow-hidden">
                <h3 class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Demanda Histórica</h3>
                <p id="kpi-total" class="text-4xl font-black text-zinc-900 mt-2">--</p>
                <div class="absolute -bottom-4 -right-4 opacity-5 text-8xl font-black">Σ</div>
            </div>
            
            <div class="glass-card p-6 border-t-4 border-t-red-500 relative overflow-hidden">
                <h3 class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Ventas Potenciales (En Espera)</h3>
                <p id="kpi-pendientes" class="text-4xl font-black text-red-600 mt-2">--</p>
                <div class="absolute -bottom-4 -right-4 opacity-5 text-8xl font-black">⌛</div>
            </div>

            <div class="glass-card p-6 border-t-4 border-t-emerald-500 relative overflow-hidden">
                <h3 class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Avisos Enviados (Recuperados)</h3>
                <p id="kpi-enviados" class="text-4xl font-black text-emerald-600 mt-2">--</p>
                <div class="absolute -bottom-4 -right-4 opacity-5 text-8xl font-black">✓</div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            
            <div class="glass-card p-6 xl:col-span-1 flex flex-col">
                <h2 class="text-lg font-bold text-zinc-900 mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Top 5 Más Buscados
                </h2>
                <div class="flex-grow flex items-center justify-center">
                    <canvas id="myChart" class="w-full"></canvas>
                </div>
            </div>

            <div class="glass-card xl:col-span-2 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-zinc-200 bg-white flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <h2 class="text-lg font-bold text-zinc-900 flex items-center gap-2">
                        <svg class="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        Radar de Reposición
                    </h2>
                    
                    <div class="relative w-full sm:w-72">
                        <input type="text" id="buscador" oninput="filtrarTabla()" class="block w-full pl-10 pr-3 py-2 border border-zinc-200 rounded-lg leading-5 bg-zinc-50 placeholder-zinc-400 focus:outline-none focus:bg-white focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 sm:text-sm transition-colors" placeholder="Buscar producto o ID...">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-zinc-50 text-zinc-500 font-semibold text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Producto & Variante</th>
                                <th class="px-6 py-4 text-left">Termómetro de Demanda</th>
                                <th class="px-6 py-4 text-center">Estado Notificaciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-cuerpo" class="divide-y divide-zinc-200 bg-white">
                            <tr><td colspan="4" class="px-6 py-8 text-center text-zinc-400">Conectando con la base de datos segura...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
    let myChart = null;
    let datosGlobales = []; // NUEVO: Variable para almacenar todos los datos y poder filtrarlos

    // ==========================================
    // LÓGICA DE EXTRACCIÓN 
    // ==========================================
    async function cargarDatos() {
      try {
        const respuesta = await fetch('/api/analytics');
        const data = await respuesta.json();

        if (data.error) {
          console.error('Error cargando datos:', data.error);
          return;
        }

        const total = data.length;
        const pendientes = data.filter(r => !r.notified).length;
        const enviados = data.filter(r => r.notified).length;

        document.getElementById('kpi-total').innerText = total;
        document.getElementById('kpi-pendientes').innerText = pendientes;
        document.getElementById('kpi-enviados').innerText = enviados;

        const agrupado = {};
        data.forEach(req => {
          const key = req.variant_id;
          if (!agrupado[key]) {
            agrupado[key] = {
              titulo: req.product_title || 'Producto desconocido',
              variant_id: req.variant_id,
              image_url: req.image_url, 
              pendientes: 0,
              enviados: 0
            };
          }
          if (req.notified) agrupado[key].enviados++;
          else agrupado[key].pendientes++;
        });

        const listaAgrupada = Object.values(agrupado).sort((a, b) => b.pendientes - a.pendientes);

        // Guardamos los datos globalmente y llamamos al filtro en lugar de renderizar directamente
        datosGlobales = listaAgrupada;
        filtrarTabla();
        
        // El gráfico siempre muestra el top 5 general, por lo que no lo filtramos
        renderizarGrafico(listaAgrupada);

      } catch (error) {
        console.error("Error de red:", error);
        document.getElementById('tabla-cuerpo').innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-red-500">Error de conexión con el servidor interno.</td></tr>';
      }
    }

    // ==========================================
    // NUEVO: LÓGICA DEL BUSCADOR
    // ==========================================
    function filtrarTabla() {
      const textoBusqueda = document.getElementById('buscador').value.toLowerCase();
      
      const datosFiltrados = datosGlobales.filter(item => {
        return item.titulo.toLowerCase().includes(textoBusqueda) || 
               item.variant_id.toString().includes(textoBusqueda);
      });

      renderizarTabla(datosFiltrados);
    }

    // ==========================================
    // RENDERIZADO VISUAL PREMIUM
    // ==========================================
    function renderizarTabla(lista) {
      const tbody = document.getElementById('tabla-cuerpo');
      tbody.innerHTML = '';

      if(lista.length === 0) {
         tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-12 text-center text-zinc-500">No se encontraron productos.</td></tr>';
         return;
      }

      // Usamos el máximo de datosGlobales para que las barras de porcentaje no se deformen al filtrar
      const maxDemand = Math.max(...datosGlobales.map(i => i.pendientes), 1);

      lista.forEach(item => {
        const perc = maxDemand > 0 ? (item.pendientes / maxDemand) * 100 : 0;
        const color = perc > 70 ? 'bg-red-500' : 'bg-zinc-800';
        
        const initials = item.titulo.substring(0,2).toUpperCase();
        const imgContent = item.image_url 
            ? `<img src="${item.image_url}" class="h-full w-full object-cover">`
            : `<span class="text-[10px] font-bold text-zinc-400">${initials}</span>`;

        tbody.innerHTML += `
          <tr class="table-row-hover border-b border-zinc-100 last:border-0">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded border border-zinc-200 bg-zinc-50 flex-shrink-0 flex items-center justify-center overflow-hidden">
                    ${imgContent}
                </div>
                <div>
                  <div class="font-bold text-zinc-900">${item.titulo}</div>
                  <div class="text-[10px] font-mono text-zinc-400 uppercase flex items-center gap-1 mt-0.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    ID: ${item.variant_id}
                  </div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 w-64">
              <div class="flex items-center gap-3">
                <div class="flex-grow bg-zinc-100 h-2 rounded-full overflow-hidden shadow-inner">
                  <div class="${color} h-full transition-all duration-1000 ease-out" style="width: ${perc}%"></div>
                </div>
                <span class="text-xs font-black text-zinc-900 w-6 text-right">${item.pendientes}</span>
              </div>
            </td>
            <td class="px-6 py-4 text-center">
              <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded bg-zinc-100 text-[10px] font-bold text-zinc-500 uppercase">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                ${item.enviados} Enviados
              </span>
            </td>
          </tr>
        `;
      });
    }

    function renderizarGrafico(lista) {
      const top5 = lista.slice(0, 5);
      const labels = top5.map(item => item.titulo.substring(0, 18) + (item.titulo.length > 18 ? '...' : ''));
      const datosPendientes = top5.map(item => item.pendientes);

      const ctx = document.getElementById('myChart').getContext('2d');
      if(myChart) myChart.destroy();

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Avisos Pendientes',
            data: datosPendientes,
            backgroundColor: '#18181b', /* zinc-900 */
            hoverBackgroundColor: '#3f3f46', /* zinc-700 */
            borderRadius: 6,
            borderSkipped: false,
            barThickness: 32
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
              legend: { display: false },
              tooltip: {
                  backgroundColor: '#18181b',
                  padding: 12,
                  titleFont: { family: 'Inter', size: 14 },
                  bodyFont: { family: 'Inter', size: 13 },
                  cornerRadius: 8
              }
          },
          scales: { 
              y: { 
                  beginAtZero: true, 
                  ticks: { stepSize: 1, color: '#a1a1aa' },
                  grid: { color: '#f4f4f5', drawBorder: false }
              },
              x: {
                  ticks: { color: '#71717a', font: { family: 'Inter', size: 11 } },
                  grid: { display: false }
              }
          }
        }
      });
    }

    // Intervalo para recargar datos cada minuto
    cargarDatos();
    setInterval(cargarDatos, 60000); 
    </script>
</body>
</html>
